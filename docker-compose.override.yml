services:
  migrate:
    build:
      target: dev

  backend:
    build:
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
