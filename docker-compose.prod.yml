services:
  migrate:
    build:
      target: prod

  backend:
    build:
      target: prod
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      target: prod
      args:
        VITE_API_URL: ${PUBLIC_API_URL}
    ports:
      - "80:80"
    restart: unless-stopped
